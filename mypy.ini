[mypy]
ignore_missing_imports = True
plugins = pydantic.mypy

# aiogram types Message.from_user, CallbackQuery.message, Message.bot, etc. as
# Optional/Union even though they are guaranteed non-None inside a registered
# handler at runtime. Disabling these two checks only for the handlers package
# avoids ~125 mechanical assert/ignore annotations that would add noise without
# catching real bugs.
[mypy-bot.handlers.*]
disable_error_code = union-attr, arg-type

[mypy-bot.middlewares.*]
disable_error_code = union-attr, override
