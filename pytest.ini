[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:pydub
    ignore::RuntimeWarning:pydub
    ignore::pytest_asyncio.plugin.PytestDeprecationWarning
markers =
    network: hits the live Shazam API with a real audio fixture (excluded via -m "not network" when offline)
